name: anymex_extension_runtime_bridge
description: "A new Flutter plugin project."
version: 1.6.1
publish_to: none

environment:
    sdk: ">=3.0.0 <4.0.0"
    flutter: ">=3.3.0"

dependencies:
    flutter:
        sdk: flutter
    plugin_platform_interface: ^2.1.8
    http: ^1.6.0
    isar_community: 3.3.0-dev.3
    isar_community_flutter_libs: 3.3.0-dev.3
    d4rt: 0.1.7
    get: ^4.7.3
    path_provider: ^2.1.5
    path: ^1.9.1
    http_interceptor: ^2.0.0
    html: ^0.15.6
    intl: ^0.20.2
    flutter_inappwebview: ^6.2.0-beta.2
    pseudom: ^1.0.1
    encrypt: ^5.0.3
    xpath_selector_html_parser: ^3.0.1
    js_packer: ^0.0.6
    crypto: ^3.0.7
    flutter_qjs:
        git:
            url: https://github.com/kodjodevf/flutter_qjs.git
            ref: f3cef51

    epubx:
        git:
            url: https://github.com/kodjodevf/epubx.dart.git
            ref: dev
    install_plugin: ^2.1.0
    device_apps: ^2.2.0
    file_picker: ^8.1.7
    jni: ^0.15.0
    archive: ^4.0.9

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0
    isar_community_generator: 3.3.0-dev.3
    build_runner: ^2.4.11
    jnigen: ^0.15.0

flutter:
    plugin:
        platforms:
            android:
                package: com.ryan.runtimebridge
                pluginClass: AnymexExtensionRuntimeBridgePlugin
            ios:
                pluginClass: AnymexExtensionRuntimeBridgePlugin
            linux:
                pluginClass: AnymexExtensionRuntimeBridgePlugin
            macos:
                pluginClass: AnymexExtensionRuntimeBridgePlugin
            windows:
                pluginClass: AnymexExtensionRuntimeBridgePlugin
